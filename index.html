<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filtre Logiciels</title>

  <!-- Lien vers le CSS séparé -->
  <link rel="stylesheet" href="https://sylvainbesson1.github.io/Widget-drop-down-filter/widget-style.css">
</head>
<body>

  <div id="widget-root">
    <!-- Header -->
    <h3>Filtres Personnalisés</h3>

    <!-- Conteneur filtres -->
    <div id="filters">
      <input type="text" id="search-input" placeholder="Recherche...">
      <select id="licence-filter">
        <option value="">Toutes les licences</option>
      </select>
      <select id="gratuit-filter">
        <option value="">Tous</option>
      </select>
      <select id="etat-filter">
        <option value="">Tous</option>
      </select>
    </div>

    <!-- Résultats -->
    <div id="results"></div>
  </div>

  <!-- JS externe -->
  <script src="https://sylvainbesson1.github.io/Widget-drop-down-filter/widget-live.js"></script>

</body>
</html>
